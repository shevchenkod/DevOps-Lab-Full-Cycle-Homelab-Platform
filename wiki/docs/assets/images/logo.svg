<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <!-- Terminal window background -->
  <rect x="2" y="2" width="116" height="36" rx="6" ry="6" fill="#0D1117" stroke="#30D5C8" stroke-width="1.5"/>
  <!-- Window dots -->
  <circle cx="13" cy="11" r="3" fill="#FF5F57"/>
  <circle cx="23" cy="11" r="3" fill="#FEBC2E"/>
  <circle cx="33" cy="11" r="3" fill="#28C840"/>
  <!-- Separator line -->
  <line x1="2" y1="18" x2="118" y2="18" stroke="#30D5C8" stroke-width="0.8" opacity="0.4"/>
  <!-- Prompt symbol -->
  <text x="10" y="33" font-family="monospace,Courier New" font-size="14" font-weight="bold" fill="#30D5C8">&gt;_</text>
  <!-- Lab text -->
  <text x="38" y="33" font-family="monospace,Courier New" font-size="12" fill="#E6EDF3">DevOps Lab</text>
</svg>
