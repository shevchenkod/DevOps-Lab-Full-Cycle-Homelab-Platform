apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Родительское приложение управляет всеми дочерними Application-объектами.
    # Паттерн App-of-Apps: один манифест вместо ручного kubectl apply для каждого сервиса.
    # При добавлении нового сервиса — создать app-*.yaml в cluster/apps/ и сделать git push.
    # Argo CD автоматически обнаружит и задеплоит новый Application.
    argocd.argoproj.io/description: "Root Application — manages all child Applications via App-of-Apps pattern"
spec:
  project: default

  source:
    repoURL: https://github.com/shevchenkod/devops-lab.git
    targetRevision: HEAD
    path: cluster/apps   # Все Application-манифесты (app-*.yaml) живут здесь

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd    # Application CRD создаются в namespace argocd

  syncPolicy:
    automated:
      prune: true        # Удалять Application если app-*.yaml удалён из git
      selfHeal: true     # Восстанавливать если Application изменён вручную
    syncOptions:
      - CreateNamespace=true
