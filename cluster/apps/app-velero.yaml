apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "12.0.0"
    helm:
      releaseName: velero
      valuesObject:

        # Плагин для S3/MinIO (AWS-compatible)
        # velero-plugin-for-aws v1.13.x совместим с Velero v1.17.x
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.13.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins

        # Отключаем volume snapshots — используем только FSB (kopia/restic)
        # Без этого helm chart создаёт VolumeSnapshotLocation с provider=null → ошибка CRD валидации
        snapshotsEnabled: false

        # Backup Storage Location → MinIO (in-cluster, namespace minio)
        configuration:
          features: EnableCSI
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero
              default: true
              config:
                region: minio
                s3ForcePathStyle: "true"
                s3Url: "http://minio.minio.svc.cluster.local:9000"
                # checksumAlgorithm="" — обязательно для MinIO + plugin v1.13.x
                checksumAlgorithm: ""

        # MinIO credentials (rootUser / rootPassword)
        credentials:
          useSecret: true
          secretContents:
            cloud: |
              [default]
              aws_access_key_id = minioadmin
              aws_secret_access_key = DevOpsLab2026!

        # Node Agent (kopia) — для файловых бэкапов PVC-томов
        deployNodeAgent: true

        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods
          privileged: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Расписания бэкапов
        schedules:

          # WordPress — каждый день в 02:00 UTC, TTL 30 дней
          wordpress-daily:
            disabled: false
            schedule: "0 2 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: "720h0m0s"
              includedNamespaces:
                - wordpress
              defaultVolumesToFsBackup: true
              storageLocation: default

          # Uptime Kuma — каждый день в 03:00 UTC, TTL 30 дней
          uptime-kuma-daily:
            disabled: false
            schedule: "0 3 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: "720h0m0s"
              includedNamespaces:
                - uptime-kuma
              defaultVolumesToFsBackup: true
              storageLocation: default

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  # Игнорируем статусные поля BSL — постоянный drift runtime-статуса
  ignoreDifferences:
    - group: velero.io
      kind: BackupStorageLocation
      jsonPointers:
        - /status

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
