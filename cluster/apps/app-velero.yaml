apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "11.4.0"
    helm:
      releaseName: velero
      valuesObject:

        # Plugin for S3/MinIO (AWS-compatible)
        # velero-plugin-for-aws v1.13.x is compatible with Velero v1.17.x
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.13.0
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins

        # Disable volume snapshots — using file-system backup only (kopia/restic)
        # Without this the helm chart creates VolumeSnapshotLocation with provider=null → CRD validation error
        snapshotsEnabled: false

        # Backup Storage Location → MinIO (in-cluster, namespace minio)
        configuration:
          features: EnableCSI
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero
              default: true
              config:
                region: minio
                s3ForcePathStyle: "true"
                s3Url: "http://minio.minio.svc.cluster.local:9000"
                # checksumAlgorithm="" — required for MinIO + plugin v1.13.x
                checksumAlgorithm: ""

        # MinIO credentials (rootUser / rootPassword)
        credentials:
          useSecret: true
          secretContents:
            cloud: |
              [default]
              aws_access_key_id = minioadmin
              aws_secret_access_key = DevOpsLab2026!

        # Node Agent (kopia) — for file-system backups of PVC volumes
        deployNodeAgent: true

        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods
          privileged: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Backup schedules
        schedules:

          # WordPress — daily at 02:00 UTC, TTL 30 days
          wordpress-daily:
            disabled: false
            schedule: "0 2 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: "720h0m0s"
              includedNamespaces:
                - wordpress
              defaultVolumesToFsBackup: true
              storageLocation: default

          # Uptime Kuma — daily at 03:00 UTC, TTL 30 days
          uptime-kuma-daily:
            disabled: false
            schedule: "0 3 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: "720h0m0s"
              includedNamespaces:
                - uptime-kuma
              defaultVolumesToFsBackup: true
              storageLocation: default

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  # Ignore BSL status fields — they constantly drift at runtime
  ignoreDifferences:
    - group: velero.io
      kind: BackupStorageLocation
      jsonPointers:
        - /status

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
