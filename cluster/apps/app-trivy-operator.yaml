apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aquasecurity.github.io/helm-charts/
    chart: trivy-operator
    targetRevision: "0.32.1"
    helm:
      releaseName: trivy-operator
      valuesObject:

        trivy:
          # Scan severity levels
          severity: CRITICAL,HIGH,MEDIUM
          # Client-server mode caches vulnerability DB locally
          mode: ClientServer

        # Prometheus metrics endpoint
        serviceMonitor:
          enabled: true

        operator:
          scanJobTimeout: 5m
          targetNamespaces: ""
          concurrentScanJobsLimit: 3
          scanJobTTL: 24h

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
