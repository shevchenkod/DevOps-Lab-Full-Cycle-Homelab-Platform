apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.55.0"
    helm:
      releaseName: loki
      valuesObject:

        # Режим: один pod (singleBinary) — достаточно для lab
        deploymentMode: SingleBinary

        loki:
          # Lab — аутентификация не нужна
          auth_enabled: false

          commonConfig:
            replication_factor: 1

          # Хранение логов на локальной файловой системе (PVC)
          storage:
            type: filesystem

          # Схема хранения (Loki 3.x — tsdb + v13)
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          persistence:
            enabled: true
            size: 10Gi
            storageClass: longhorn-single

        # Отключаем масштабируемые компоненты (не нужны для singleBinary)
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        # Отключаем кэши (экономим память в lab)
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false

        # Отключаем встроенный MinIO — используем Longhorn filesystem
        minio:
          enabled: false

        # Отключаем self-monitoring (требует Grafana Agent)
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false

        # Отключаем тестовые Pod'ы
        test:
          enabled: false

        # Gateway (nginx) не нужен — Promtail будет писать напрямую в Loki service
        gateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: loki

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
