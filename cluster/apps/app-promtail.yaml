apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: "6.17.1"
    helm:
      releaseName: promtail
      valuesObject:

        # DaemonSet — запускается на каждой ноде, читает /var/log/pods
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi

        config:
          # Адрес Loki service (внутри кластера)
          clients:
            - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push

          # Позиции — где Promtail сохраняет прогресс чтения логов
          positions:
            filename: /run/promtail/positions.yaml

          # Источники логов: все поды через CRI
          snippets:
            pipelineStages:
              - cri: {}

        # Tolerations — запускать в т.ч. на master/control-plane нодах
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: loki

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
