apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: wordpress
    targetRevision: "30.0.13"  # BSI chart + legacy debian images из docker.io/bitnamilegacy (без FIPS/Photon)
    helm:
      releaseName: wordpress
      valuesObject:

        wordpressUsername: admin
        existingSecret: wordpress-credentials
        wordpressEmail: admin@lab.local
        wordpressBlogName: "DevOps Lab"

        # Переопределяем образ на bitnamilegacy (debian-12) — BSI/Photon образы несовместимы с non-FIPS Ubuntu ядром
        # bitnami/wordpress удалены с dockerhub, bitnamilegacy — официальный legacy репозиторий Bitnami
        image:
          registry: docker.io
          repository: bitnamilegacy/wordpress
          tag: 6.8.2-debian-12-r5

        # Разрешаем non-BSI образы (bitnamilegacy не проходит верификацию BSI)
        global:
          security:
            allowInsecureImages: true

        service:
          type: ClusterIP

        ingress:
          enabled: true
          ingressClassName: nginx
          hostname: wordpress.lab.local
          annotations:
            cert-manager.io/cluster-issuer: lab-ca-issuer
            nginx.ingress.kubernetes.io/proxy-body-size: "64m"
          tls: true
          extraTls:
            - hosts:
                - wordpress.lab.local
              secretName: wordpress-tls

        persistence:
          enabled: true
          storageClass: longhorn
          size: 5Gi

        mariadb:
          enabled: true
          auth:
            existingSecret: wordpress-credentials
            forcePassword: false
          image:
            registry: docker.io
            repository: bitnamilegacy/mariadb
            tag: 11.8.3-debian-12-r0
          primary:
            persistence:
              enabled: true
              storageClass: longhorn
              size: 2Gi

        # Rolling Update стратегия
        # ⚠️ WordPress использует RWO PVC (ReadWriteOnce) — нельзя монтировать к 2 pods одновременно
        # Поэтому maxSurge: 0 — сначала убиваем старый pod, потом поднимаем новый (краткий gap ~10-30s)
        # Альтернатива zero-downtime: RWX storage или Recreate strategy
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0        # не создавать новый pod до удаления старого (RWO PVC ограничение)
            maxUnavailable: 1  # убить старый pod → освободить PVC → запустить новый

        # HPA отключён: RWO PVC не поддерживает горизонтальное масштабирование
        autoscaling:
          enabled: false

        # PDB — защита при drain / rolling update
        pdb:
          create: true
          minAvailable: 1      # всегда как минимум 1 pod доступен

        # Ресурсы — requests + limits (нужны для HPA CPU%)
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  # Игнорируем drift StatefulSet (mariadb) — K8s 1.27+ авто-добавляет поля, не входящие в Helm-шаблон:
  #   - persistentVolumeClaimRetentionPolicy: Retain/Retain (1.27+ default)
  #   - volumeClaimTemplates[0].spec.volumeMode: Filesystem (API-server default)
  #   - volumeClaimTemplates[0].status: {phase: Pending}
  #   - volumeClaimTemplates[0].apiVersion/kind/metadata.creationTimestamp: API-server normalization
  #   - managedFieldsManagers: kube-controller-manager (SSA mode — exclude kcm-owned fields)
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: wordpress-mariadb
      managedFieldsManagers:
        - kube-controller-manager
      jsonPointers:
        - /status
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/volumeClaimTemplates/0/spec/volumeMode
        - /spec/volumeClaimTemplates/0/status
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/volumeClaimTemplates/0/metadata/creationTimestamp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

