# PrometheusRule — SLO для WordPress через NGINX Ingress метрики
#
# SLI определения:
#   Availability SLI = доля запросов БЕЗ HTTP 5xx (цель: 99.5% за 30 дней)
#   Latency SLI      = доля запросов с latency < 500ms (цель: 95% за 30 дней)
#
# Error budget (99.5% SLO, 30 дней):
#   Allowed downtime = 0.5% × 30d × 24h × 60m = 216 минут в месяц
#
# Правильные лейблы NGINX Ingress:
#   ingress           = имя Ingress ресурса  → "wordpress"
#   exported_namespace= namespace Ingress'а  → "wordpress"
#   namespace         = namespace контроллера → "ingress-nginx" (НЕ используем)
#
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wordpress-slo
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:

    # ─── Recording rules: скользящие окна для burn-rate алертов ─────────────
    - name: wordpress.slo.recording
      interval: 30s
      rules:

        # Доля ошибок (5xx) за последние 5 минут
        - record: job:wordpress_request_error_rate:ratio_rate5m
          expr: |
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress",
              status=~"5.."
            }[5m]))
            /
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[5m]))

        # Доля ошибок за последние 30 минут
        - record: job:wordpress_request_error_rate:ratio_rate30m
          expr: |
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress",
              status=~"5.."
            }[30m]))
            /
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[30m]))

        # Доля ошибок за последние 1 час
        - record: job:wordpress_request_error_rate:ratio_rate1h
          expr: |
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress",
              status=~"5.."
            }[1h]))
            /
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[1h]))

        # Доля ошибок за последние 6 часов
        - record: job:wordpress_request_error_rate:ratio_rate6h
          expr: |
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress",
              status=~"5.."
            }[6h]))
            /
            sum(rate(nginx_ingress_controller_requests{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[6h]))

        # Доля быстрых запросов (<500ms) за 5 минут
        - record: job:wordpress_request_latency_ok:ratio_rate5m
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{
              ingress="wordpress",
              exported_namespace="wordpress",
              le="0.5"
            }[5m]))
            /
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[5m]))

        # Доля быстрых запросов (<500ms) за 1 час
        - record: job:wordpress_request_latency_ok:ratio_rate1h
          expr: |
            sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{
              ingress="wordpress",
              exported_namespace="wordpress",
              le="0.5"
            }[1h]))
            /
            sum(rate(nginx_ingress_controller_request_duration_seconds_count{
              ingress="wordpress",
              exported_namespace="wordpress"
            }[1h]))

    # ─── Алерты: Availability SLO (99.5%) ───────────────────────────────────
    # Multi-window, multi-burn-rate approach (Google SRE Book)
    - name: wordpress.slo.availability
      rules:

        # CRITICAL: быстрый расход error budget — 14x burn rate за 1h + 5m
        - alert: WordPressAvailabilitySLOBurnRateCritical
          expr: |
            job:wordpress_request_error_rate:ratio_rate1h > (14 * 0.005)
            and
            job:wordpress_request_error_rate:ratio_rate5m > (14 * 0.005)
          for: 2m
          labels:
            severity: critical
            service: wordpress
            slo: availability
          annotations:
            summary: "WordPress: критический расход error budget"
            description: >
              Скорость ошибок превышает 14x SLO порог ({{ $value | humanizePercentage }}).
              SLO: 99.5% availability. Error budget сгорит за ~2 часа.
              Немедленно проверьте WordPress поды и MariaDB!

        # WARNING: медленный расход error budget — 6x burn rate за 6h + 30m
        - alert: WordPressAvailabilitySLOBurnRateWarning
          expr: |
            job:wordpress_request_error_rate:ratio_rate6h > (6 * 0.005)
            and
            job:wordpress_request_error_rate:ratio_rate30m > (6 * 0.005)
          for: 15m
          labels:
            severity: warning
            service: wordpress
            slo: availability
          annotations:
            summary: "WordPress: повышенный расход error budget"
            description: >
              Скорость ошибок превышает 6x SLO порог ({{ $value | humanizePercentage }}).
              SLO: 99.5% availability. Error budget закончится за ~5 дней.

    # ─── Алерты: Latency SLO (95% запросов < 500ms) ─────────────────────────
    - name: wordpress.slo.latency
      rules:

        - alert: WordPressLatencySLOViolation
          expr: |
            job:wordpress_request_latency_ok:ratio_rate1h < 0.95
          for: 10m
          labels:
            severity: warning
            service: wordpress
            slo: latency
          annotations:
            summary: "WordPress: нарушен SLO по latency"
            description: >
              Только {{ $value | humanizePercentage }} запросов выполняются
              быстрее 500ms (SLO: 95%).

    # ─── Алерты: Pod Availability (быстрый детект недоступности) ────────────
    - name: wordpress.availability
      rules:

        - alert: WordPressDown
          expr: |
            kube_deployment_status_replicas_available{
              deployment="wordpress",
              namespace="wordpress"
            } == 0
          for: 2m
          labels:
            severity: critical
            service: wordpress
          annotations:
            summary: "WordPress недоступен"
            description: "Ни один под WordPress не Ready более 2 минут."

        - alert: WordPressPartiallyDown
          expr: |
            kube_deployment_status_replicas_available{
              deployment="wordpress",
              namespace="wordpress"
            }
            <
            kube_deployment_spec_replicas{
              deployment="wordpress",
              namespace="wordpress"
            }
          for: 5m
          labels:
            severity: warning
            service: wordpress
          annotations:
            summary: "WordPress: неполное количество реплик"
            description: >
              Доступно {{ $value }} реплик из ожидаемых.
