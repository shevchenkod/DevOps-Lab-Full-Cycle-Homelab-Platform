---
# Grafana Dashboard: Node Exporter Full (grafana.com/dashboards/1860)
# Sidecar automatically picks up ConfigMaps with label grafana_dashboard=1
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-exporter
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
data:
  node-exporter-full.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "7.0.0" },
        { "type": "panel", "id": "gauge", "name": "Gauge", "version": "" },
        { "type": "panel", "id": "graph", "name": "Graph", "version": "" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "Node Exporter Full — CPU, Memory, Disk, Network per node",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "CPU",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 1, "fillOpacity": 10 },
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{instance=~\"$node\", mode=\"idle\"}[$__rate_interval])) by (instance)",
              "legendFormat": "{{instance}} CPU used",
              "refId": "A"
            }
          ],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit", "custom": { "lineWidth": 1, "fillOpacity": 10 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "targets": [
            {
              "expr": "irate(node_cpu_seconds_total{instance=~\"$node\", mode!=\"idle\"}[$__rate_interval])",
              "legendFormat": "{{instance}} {{mode}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage by Mode",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 4,
          "title": "Memory",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 10 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 5,
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{instance=~\"$node\"} - node_memory_MemAvailable_bytes{instance=~\"$node\"}",
              "legendFormat": "{{instance}} used",
              "refId": "A"
            },
            {
              "expr": "node_memory_MemTotal_bytes{instance=~\"$node\"}",
              "legendFormat": "{{instance}} total",
              "refId": "B"
            }
          ],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit", "max": 1, "min": 0,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.7 },
                { "color": "red", "value": 0.9 }
              ]}
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 6,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            {
              "expr": "1 - (node_memory_MemAvailable_bytes{instance=~\"$node\"} / node_memory_MemTotal_bytes{instance=~\"$node\"})",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Memory Used %",
          "type": "gauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 7,
          "title": "Disk",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "percentunit", "max": 1, "min": 0,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.7 },
                { "color": "red", "value": 0.85 }
              ]}
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 8,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            {
              "expr": "1 - (node_filesystem_avail_bytes{instance=~\"$node\", fstype!~\"tmpfs|overlay\", mountpoint=\"/\"} / node_filesystem_size_bytes{instance=~\"$node\", fstype!~\"tmpfs|overlay\", mountpoint=\"/\"})",
              "legendFormat": "{{instance}} /",
              "refId": "A"
            }
          ],
          "title": "Disk Used % (root)",
          "type": "gauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "Bps", "custom": { "lineWidth": 1, "fillOpacity": 10 } }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 9,
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total{instance=~\"$node\"}[$__rate_interval])",
              "legendFormat": "{{instance}} {{device}} read",
              "refId": "A"
            },
            {
              "expr": "rate(node_disk_written_bytes_total{instance=~\"$node\"}[$__rate_interval])",
              "legendFormat": "{{instance}} {{device}} write",
              "refId": "B"
            }
          ],
          "title": "Disk I/O",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 10,
          "title": "Network",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "bps", "custom": { "lineWidth": 1, "fillOpacity": 10 } }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "id": 11,
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{instance=~\"$node\", device!~\"lo|veth.*|cali.*|tunl.*\"}[$__rate_interval]) * 8",
              "legendFormat": "{{instance}} {{device}} rx",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{instance=~\"$node\", device!~\"lo|veth.*|cali.*|tunl.*\"}[$__rate_interval]) * 8",
              "legendFormat": "{{instance}} {{device}} tx",
              "refId": "B"
            }
          ],
          "title": "Network Traffic",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["node", "linux", "prometheus"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Datasource"
          },
          {
            "current": {},
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(node_cpu_seconds_total, instance)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "node",
            "query": "label_values(node_cpu_seconds_total, instance)",
            "refresh": 2,
            "sort": 1,
            "type": "query",
            "label": "Node"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Node Exporter — Lab",
      "uid": "lab-node-exporter",
      "version": 1
    }
