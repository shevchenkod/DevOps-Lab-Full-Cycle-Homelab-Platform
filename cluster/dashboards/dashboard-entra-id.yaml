      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Entra ID Security - YourOrg",
      "uid": "ciellos-entra-id-security",
      "panels": [

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 100, "title": "Overview", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 }, "id": 1, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "none" }, "title": "Total Sign-ins (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize count()", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 50 }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 }, "id": 2, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }, "title": "Failed Sign-ins (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| where ResultType != 0\n| summarize count()", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 20 }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 }, "id": 3, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }, "title": "Legacy Auth Attempts (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| where ClientAppUsed in ('Exchange ActiveSync','Authenticated SMTP','IMAP4','POP3','MAPI','Other clients')\n| summarize count()", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 70 }, { "color": "green", "value": 90 }] }, "unit": "percent", "min": 0, "max": 100 }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 }, "id": 4, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true }, "title": "MFA Coverage (7d)", "type": "gauge", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(7d)\n| summarize Total=count(), WithMFA=countif(AuthenticationRequirement == 'multiFactorAuthentication')\n| extend Percent=round(100.0 * WithMFA / Total, 1)\n| project Percent", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 }, "id": 5, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }, "title": "Countries (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize dcount(tostring(LocationDetails.countryOrRegion))", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 }, "id": 6, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }, "title": "Unique Users (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize dcount(UserPrincipalName)", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }, "id": 101, "title": "Sign-in Timeline", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 15, "spanNulls": true } }, "overrides": [{ "matcher": { "id": "byName", "options": "Failed" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }, { "id": "custom.fillOpacity", "value": 25 }] }, { "matcher": { "id": "byName", "options": "Success" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }] }, "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 }, "id": 10, "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } }, "title": "Sign-ins: Success vs Failed (over time)", "type": "timeseries", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where $__timeFilter(TimeGenerated)\n| summarize\n    Success=countif(ResultType == 0),\n    Failed=countif(ResultType != 0)\n  by bin(TimeGenerated, $__interval)\n| order by TimeGenerated asc", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 }, "id": 110, "title": "Distribution and Rankings", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "hideFrom": { "legend": false, "tooltip": false, "viz": false } } }, "overrides": [{ "matcher": { "id": "byName", "options": "Success" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }, { "matcher": { "id": "byName", "options": "Failed" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }] }, "gridPos": { "h": 8, "w": 8, "x": 0, "y": 15 }, "id": 50, "options": { "pieType": "donut", "tooltip": { "mode": "single", "sort": "none" }, "legend": { "displayMode": "list", "placement": "right", "showLegend": true }, "displayLabels": ["percent", "name"] }, "title": "Success vs Failed (24h)", "type": "piechart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize\n    Success=countif(ResultType == 0),\n    Failed=countif(ResultType != 0)", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "continuous-blues" }, "custom": { "fillOpacity": 80, "lineWidth": 0 } }, "overrides": [] }, "gridPos": { "h": 8, "w": 8, "x": 8, "y": 15 }, "id": 51, "options": { "xField": "Country", "fillOpacity": 80, "gradientMode": "opacity", "orientation": "horizontal", "showValue": "auto", "barWidth": 0.8, "barRadius": 0.03, "tooltip": { "mode": "single" }, "legend": { "showLegend": false } }, "title": "Top Countries (24h)", "type": "barchart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count() by Country=tostring(LocationDetails.countryOrRegion)\n| where Country != ''\n| order by Count desc\n| take 10", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "continuous-GrYlRd" }, "custom": { "fillOpacity": 80, "lineWidth": 0 } }, "overrides": [] }, "gridPos": { "h": 8, "w": 8, "x": 16, "y": 15 }, "id": 52, "options": { "xField": "AppDisplayName", "fillOpacity": 80, "gradientMode": "opacity", "orientation": "horizontal", "showValue": "auto", "barWidth": 0.8, "barRadius": 0.03, "tooltip": { "mode": "single" }, "legend": { "showLegend": false } }, "title": "Top Apps (24h)", "type": "barchart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count() by AppDisplayName\n| where AppDisplayName != ''\n| order by Count desc\n| take 10", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 }, "id": 111, "title": "Activity Patterns", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "continuous-BlPu" }, "custom": { "fillOpacity": 85, "lineWidth": 0 } }, "overrides": [] }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 }, "id": 53, "options": { "xField": "Hour", "fillOpacity": 85, "gradientMode": "opacity", "orientation": "auto", "showValue": "auto", "barWidth": 0.9, "barRadius": 0.05, "tooltip": { "mode": "single" }, "legend": { "showLegend": false } }, "title": "Sign-ins by Hour of Day (7d)", "type": "barchart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(7d)\n| summarize Count=count() by Hour=hourofday(TimeGenerated)\n| order by Hour asc", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "continuous-RdYlGr" }, "custom": { "fillOpacity": 80, "lineWidth": 0 } }, "overrides": [] }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 }, "id": 54, "options": { "xField": "DayName", "fillOpacity": 80, "gradientMode": "opacity", "orientation": "auto", "showValue": "auto", "barWidth": 0.8, "barRadius": 0.05, "tooltip": { "mode": "single" }, "legend": { "showLegend": false } }, "title": "Sign-ins by Day of Week (7d)", "type": "barchart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(7d)\n| extend DayNum=toint(dayofweek(TimeGenerated) / 1d)\n| summarize Count=count() by DayNum\n| extend DayName=case(DayNum==0,'Sun',DayNum==1,'Mon',DayNum==2,'Tue',DayNum==3,'Wed',DayNum==4,'Thu',DayNum==5,'Fri','Sat')\n| order by DayNum asc\n| project DayName, Count", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 }, "id": 113, "title": "Security Indicators", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 15 }] }, "unit": "percent", "min": 0, "max": 100 }, "overrides": [] }, "gridPos": { "h": 8, "w": 6, "x": 0, "y": 33 }, "id": 60, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true, "showThresholdMarkers": true }, "title": "Legacy Auth % (7d)", "type": "gauge", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(7d)\n| summarize Total=count(), Legacy=countif(ClientAppUsed in ('Exchange ActiveSync','Authenticated SMTP','IMAP4','POP3','MAPI','Other clients'))\n| extend LegacyPct=iif(Total > 0, round(100.0 * Legacy / Total, 1), 0.0)\n| project LegacyPct", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "hideFrom": { "legend": false, "tooltip": false, "viz": false } } }, "overrides": [] }, "gridPos": { "h": 8, "w": 6, "x": 6, "y": 33 }, "id": 61, "options": { "pieType": "pie", "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "right", "showLegend": true }, "displayLabels": ["percent"] }, "title": "Sign-ins by Browser (24h)", "type": "piechart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count() by Browser=tostring(DeviceDetail.browser)\n| where Browser != '' and Browser != 'Unknown'\n| order by Count desc\n| take 8", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "fillOpacity": 80, "lineWidth": 0 } }, "overrides": [] }, "gridPos": { "h": 8, "w": 8, "x": 12, "y": 33 }, "id": 62, "options": { "xField": "Platform", "fillOpacity": 80, "gradientMode": "none", "orientation": "horizontal", "showValue": "auto", "barWidth": 0.8, "barRadius": 0.05, "tooltip": { "mode": "single" }, "legend": { "showLegend": false } }, "title": "Sign-ins by OS Platform (24h)", "type": "barchart", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count() by Platform=tostring(DeviceDetail.operatingSystem)\n| where Platform != ''\n| order by Count desc\n| take 8", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 20 }] }, "unit": "short" }, "overrides": [] }, "gridPos": { "h": 8, "w": 4, "x": 20, "y": 33 }, "id": 63, "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" }, "title": "Guest Sign-ins (24h)", "type": "stat", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize count=countif(UserPrincipalName contains '#EXT#')", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 41 }, "id": 112, "title": "Sign-in Success Rate Trend", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "custom": { "lineWidth": 2, "fillOpacity": 20, "spanNulls": true, "gradientMode": "opacity" }, "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 80 }, { "color": "green", "value": 95 }] } }, "overrides": [] }, "gridPos": { "h": 8, "w": 24, "x": 0, "y": 42 }, "id": 56, "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }, "thresholdsStyle": { "mode": "line" } }, "title": "Sign-in Success Rate % over time", "type": "timeseries", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where $__timeFilter(TimeGenerated)\n| summarize Total=count(), Success=countif(ResultType == 0) by bin(TimeGenerated, $__interval)\n| where Total > 0\n| extend SuccessRate=round(100.0 * Success / Total, 1)\n| project TimeGenerated, SuccessRate\n| order by TimeGenerated asc", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 50 }, "id": 102, "title": "Geography and Top Users", "type": "row" },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "custom": { "align": "auto" }, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } }, "overrides": [{ "matcher": { "id": "byName", "options": "Count" }, "properties": [{ "id": "custom.width", "value": 80 }] }] }, "gridPos": { "h": 10, "w": 8, "x": 0, "y": 51 }, "id": 20, "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Count" }] }, "title": "Top Countries (table)", "type": "table", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count() by Country=tostring(LocationDetails.countryOrRegion)\n| where Country != ''\n| order by Count desc\n| take 15", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

        { "datasource": { "type": "grafana-azure-monitor-datasource", "uid": "Azure Monitor" }, "fieldConfig": { "defaults": { "custom": { "align": "auto" } }, "overrides": [] }, "gridPos": { "h": 10, "w": 8, "x": 8, "y": 51 }, "id": 21, "options": { "footer": { "show": false }, "showHeader": true }, "title": "Top Users by Sign-ins", "type": "table", "targets": [{ "azureLogAnalytics": { "query": "SigninLogs\n| where TimeGenerated > ago(24h)\n| summarize Count=count(), Failed=countif(ResultType != 0) by UserPrincipalName\n| order by Count desc\n| take 15", "resources": ["/subscriptions/<YOUR_SUBSCRIPTION_ID>/resourceGroups/<YOUR_RG>/providers/Microsoft.OperationalInsights/workspaces/<YOUR_LAW_NAME>"] }, "queryType": "Azure Log Analytics", "refId": "A" }] },

