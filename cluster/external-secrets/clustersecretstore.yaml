---
# ClusterSecretStore: vault-backend
# Connects External Secrets Operator to HashiCorp Vault (KV v2)
#
# ⚠️  PREREQUISITES (run after vault-init.md):
#     1. Vault is initialized and unsealed
#     2. KV v2 secrets engine enabled at path "secret/"
#     3. Vault token stored as SealedSecret:
#        kubectl create secret generic vault-token \
#          -n external-secrets \
#          --from-literal=token=<VAULT_ROOT_TOKEN> \
#          --dry-run=client -o yaml \
#          | kubeseal --controller-name=sealed-secrets-controller \
#                     --controller-namespace=kube-system \
#          | kubectl apply -f -
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Vault server address (in-cluster)
      server: "http://vault.vault.svc.cluster.local:8200"
      # KV secrets engine mount path
      path: "secret"
      # KV version: v2 (recommended)
      version: "v2"
      # Auth: token from Kubernetes Secret
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
