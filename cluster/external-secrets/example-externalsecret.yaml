---
# ExternalSecret Example — demo-secret
#
# This demonstrates the ESO pattern:
#   Vault path secret/demo → K8s Secret "demo-secret" in namespace "default"
#
# To create a secret in Vault first:
#   kubectl exec -n vault vault-0 -- sh -c \
#     "VAULT_TOKEN=<root_token> vault kv put secret/demo \
#      username=demo password=S3cr3tP@ssw0rd"
#
# After applying this manifest:
#   kubectl get secret demo-secret -n default -o yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: default
spec:
  # Refresh interval — ESO re-syncs from Vault every 1 hour
  refreshInterval: 1h

  # Reference to ClusterSecretStore
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # Target K8s Secret
  target:
    name: demo-secret
    creationPolicy: Owner

  # Fields to sync from Vault → K8s Secret
  data:
    - secretKey: username       # K8s secret key
      remoteRef:
        key: demo               # Vault path: secret/demo
        property: username      # Vault field

    - secretKey: password
      remoteRef:
        key: demo
        property: password
