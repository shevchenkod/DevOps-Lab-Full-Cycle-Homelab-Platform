apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  strategy:
    type: Recreate   # SQLite — only one pod writes to PVC
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      serviceAccountName: n8n   # RBAC: read-only access to K8s API
      containers:
        - name: n8n
          image: n8nio/n8n:2.10.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5678
          env:
            - name: N8N_HOST
              value: "n8n.lab.local"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: WEBHOOK_URL
              value: "https://n8n.lab.local/"
            - name: GENERIC_TIMEZONE
              value: "Europe/Kiev"
            - name: N8N_LOG_LEVEL
              value: "info"
            - name: N8N_METRICS
              value: "true"
            - name: DB_TYPE
              value: "sqlite"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: N8N_ENCRYPTION_KEY
            - name: N8N_USER_MANAGEMENT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: n8n-secret
                  key: N8N_USER_MANAGEMENT_JWT_SECRET
            # Telegram Bot — for N8N workflows
            - name: N8N_TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-telegram-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: N8N_TELEGRAM_CHAT_ID
              value: "236281826"
            # Kubernetes API — Bearer token for HTTP Request nodes
            - name: K8S_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-k8s-token
                  key: token
            - name: K8S_API_HOST
              value: "https://kubernetes.default.svc.cluster.local"
            # Allow Code nodes to use built-in Node.js modules (https, fs for K8s API calls)
            - name: NODE_FUNCTION_ALLOW_BUILTIN
              value: "https,fs,url,http"
            # Trust proxy headers from ingress-nginx (fixes ERR_ERL_UNEXPECTED_X_FORWARDED_FOR)
            - name: N8N_PROXY_HOPS
              value: "1"
            # Allow workflows to access env vars ($env.VAR in expressions/code nodes)
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            # Disable telemetry/diagnostics (PostHog unreachable in homelab)
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
