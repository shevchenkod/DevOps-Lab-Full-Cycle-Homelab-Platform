---
# ServiceAccount для N8N — используется для доступа к Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: n8n

---
# Долгоживущий токен для ServiceAccount (N8N workflows)
apiVersion: v1
kind: Secret
metadata:
  name: n8n-k8s-token
  namespace: n8n
  annotations:
    kubernetes.io/service-account.name: n8n
type: kubernetes.io/service-account-token

---
# ClusterRole: read-only доступ к основным ресурсам кластера
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: n8n-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "pods/log", "namespaces", "persistentvolumeclaims",
                "services", "endpoints", "events", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules", "alertmanagerconfigs", "podmonitors", "servicemonitors"]
    verbs: ["get", "list"]
  - apiGroups: ["velero.io"]
    resources: ["backups", "schedules", "backupstoragelocations", "restores"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding: привязка ClusterRole к ServiceAccount n8n
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: n8n-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: n8n-cluster-reader
subjects:
  - kind: ServiceAccount
    name: n8n
    namespace: n8n
