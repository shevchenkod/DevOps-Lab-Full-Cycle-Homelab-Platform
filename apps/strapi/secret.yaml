apiVersion: v1
kind: Secret
metadata:
  name: strapi-secrets
  namespace: strapi
type: Opaque
data:
  # ⚠️ Lab only — in production use SealedSecrets / ExternalSecrets
  # Generate with: openssl rand -base64 32 | base64
  app_keys: <BASE64_ENCODED_APP_KEYS>
  api_token_salt: <BASE64_ENCODED_API_TOKEN_SALT>
  admin_jwt_secret: <BASE64_ENCODED_ADMIN_JWT_SECRET>
  jwt_secret: <BASE64_ENCODED_JWT_SECRET>
  transfer_token_salt: <BASE64_ENCODED_TRANSFER_TOKEN_SALT>
